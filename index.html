<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>ESP32 Health Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!-- ✅ CSS แยกไฟล์ -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="17" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 2" opacity=".4"/>
      <circle cx="18" cy="18" r="12" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1" opacity=".5"/>
      <path d="M6 18 H10 L12 14 L15 22 L18 10 L21 26 L24 18 H30"
            stroke="#00d4ff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>ESP32 HEALTH MONITOR</h1>
    <svg class="ecg-svg" viewBox="0 0 80 28">
      <path class="ecg-path" d="M0,14 H18 L20,10 L22,18 L24,6 L26,22 L28,14 H46 L48,10 L50,18 L52,6 L54,22 L56,14 H80"/>
    </svg>
  </div>
</header>

<div class="content">

  <!-- BLE -->
  <div class="card ble-card">
    <div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>
    <div class="btn-row">
      <button id="connectBleButton"    class="connectButton">🔗 Connect BLE</button>
      <button id="disconnectBleButton" class="disconnectButton">✖ Disconnect</button>
    </div>
    <div class="ble-status">
      <div class="status-dot" id="statusDot"></div>
      <span>BLE Status: <span id="bleState">Disconnected</span></span>
    </div>
  </div>

  <!-- VITALS -->
  <div class="vitals-grid">
    <div class="vital-card hr">
      <div class="beat-ring"></div>
      <div class="vital-label">❤️ Heart Rate</div>
      <div class="vital-value" id="hrValue">--</div>
      <div class="vital-unit">bpm</div>
      <div class="vital-time">Last: <span id="hrTime">--</span></div>
    </div>

    <div class="vital-card spo2">
      <div class="vital-label">🩸 SpO₂</div>
      <div class="vital-value" id="spo2Value">--</div>
      <div class="vital-unit">%</div>
      <div class="vital-time">Last: <span id="spo2Time">--</span></div>
    </div>

    <div class="vital-card temp">
      <div class="vital-label">🌡️ Body Temp</div>
      <div class="thermo-section">
        <div class="thermo-body">
          <div class="thermo-tube-wrap">
            <div class="thermo-tube">
              <div class="thermo-fill" id="thermoFill" style="height:0%"></div>
            </div>
            <div class="thermo-bulb" id="thermoBulb"></div>
          </div>
          <div class="thermo-scale">
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">35°</span></div>
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">30°</span></div>
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">25°</span></div>
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">20°</span></div>
          </div>
          <div class="thermo-readout">
            <div class="thermo-num" id="thermoNum">--</div>
            <div class="vital-unit">°C</div>
            <div class="thermo-badge badge-na" id="thermoStatus">-- N/A</div>
          </div>
        </div>
      </div>
      <div class="vital-time">Last: <span id="tempTime">--</span></div>
    </div>
  </div>

  <!-- LED -->
  <div class="card led-card">
    <div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>
    <div class="section-title">
      <span class="led-indicator" id="ledIndicator"></span>
      💡 Control LED (GPIO 2)
    </div>
    <div class="btn-row">
      <button id="onButton"  class="onButton">ON</button>
      <button id="offButton" class="offButton">OFF</button>
    </div>
    <div class="led-last">Last sent: <span id="valueSent">--</span></div>
  </div>

  <!-- DATA LOGGER -->
  <div class="card">
    <div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>
    <div class="logger-title">📋 Data Logger</div>
    <div class="logger-buttons">
      <button id="saveButton"     class="saveButton">💾 บันทึกค่าปัจจุบัน</button>
      <button id="downloadButton" class="downloadButton">⬇️ ดาวน์โหลด CSV</button>
      <button id="clearButton"    class="clearButton">🗑️ ล้างข้อมูล</button>
    </div>
    <div class="record-count">บันทึกแล้ว: <strong><span id="recordCount">0</span></strong> รายการ</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>เวลา</th>
            <th>❤️ HR (bpm)</th><th>🩸 SpO₂ (%)</th><th>🌡️ Temp (°C)</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" class="no-data">ยังไม่มีข้อมูล</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
/* ===== ELEMENTS ===== */
const connectBtn    = document.getElementById("connectBleButton");
const disconnectBtn = document.getElementById("disconnectBleButton");
const onBtn         = document.getElementById("onButton");
const offBtn        = document.getElementById("offButton");
const saveBtn       = document.getElementById("saveButton");
const downloadBtn   = document.getElementById("downloadButton");
const clearBtn      = document.getElementById("clearButton");
const bleStateEl    = document.getElementById("bleState");
const statusDot     = document.getElementById("statusDot");
const hrValueEl     = document.getElementById("hrValue");
const hrTimeEl      = document.getElementById("hrTime");
const spo2ValueEl   = document.getElementById("spo2Value");
const spo2TimeEl    = document.getElementById("spo2Time");
const tempTimeEl    = document.getElementById("tempTime");
const valueSentEl   = document.getElementById("valueSent");
const tableBody     = document.getElementById("tableBody");
const recordCount   = document.getElementById("recordCount");

/* ===== UUID ===== */
const deviceName  = "ESP32TONG";
const serviceUUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
const tempUUID    = "19b10001-e8f2-537e-4f6c-d104768a1214";
const ledUUID     = "19b10002-e8f2-537e-4f6c-d104768a1214";
const hrUUID      = "19b10003-e8f2-537e-4f6c-d104768a1214";
const spo2UUID    = "19b10004-e8f2-537e-4f6c-d104768a1214";

/* ===== STATE ===== */
let bleDevice  = null;
let bleServer  = null;
let bleService = null;
let records    = [];

/* ===== EVENTS ===== */
connectBtn.onclick    = connectBLE;
disconnectBtn.onclick = disconnectBLE;
onBtn.onclick         = () => writeLED(1);
offBtn.onclick        = () => writeLED(0);
saveBtn.onclick       = saveRecord;
downloadBtn.onclick   = downloadCSV;
clearBtn.onclick      = clearRecords;

const now = () => new Date().toLocaleTimeString();

/* ===== BLE STATUS ===== */
function setStatus(connected) {
  bleStateEl.textContent = connected ? "Connected" : "Disconnected";
  bleStateEl.className   = connected ? "connected" : "";
  statusDot.className    = "status-dot" + (connected ? " connected" : "");
}

/* ===== THERMOMETER =====
   ช่วง: 20–35°C
   < 25°C  → อุณหภูมิต่ำ  (น้ำเงิน)
   25–30°C → อุณหภูมิปกติ (เขียว)
   > 30°C  → อุณหภูมิสูง  (แดง)
*/
const T_MIN = 20;
const T_MAX = 35;

function updateThermometer(temp) {
  const pct = Math.max(2, Math.min(98, ((temp - T_MIN) / (T_MAX - T_MIN)) * 100));
  document.getElementById("thermoFill").style.height = pct + "%";
  document.getElementById("thermoNum").textContent   = temp.toFixed(1);

  const status = document.getElementById("thermoStatus");
  const bulb   = document.getElementById("thermoBulb");

  if (temp < 25) {
    status.className   = "thermo-badge badge-low";
    status.textContent = "❄️ อุณหภูมิต่ำ";
    bulb.style.background = "radial-gradient(circle at 35% 30%,#a0d0ff,#4080ff)";
    bulb.style.boxShadow  = "0 0 16px rgba(79,141,255,.8)";
  } else if (temp <= 30) {
    status.className   = "thermo-badge badge-norm";
    status.textContent = "✅ อุณหภูมิปกติ";
    bulb.style.background = "radial-gradient(circle at 35% 30%,#ffe060,#ff6a00)";
    bulb.style.boxShadow  = "0 0 16px rgba(255,140,0,.8)";
  } else {
    status.className   = "thermo-badge badge-high";
    status.textContent = "🔴 อุณหภูมิสูง";
    bulb.style.background = "radial-gradient(circle at 35% 30%,#ff8080,#cc0000)";
    bulb.style.boxShadow  = "0 0 20px rgba(255,60,60,1),0 0 36px rgba(200,0,0,.5)";
  }
}

/* ===== CONNECT BLE ===== */
async function connectBLE() {
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: deviceName }],
      optionalServices: [serviceUUID],
    });
    bleDevice.addEventListener("gattservicedisconnected", onDisconnected);
    bleServer  = await bleDevice.gatt.connect();
    bleService = await bleServer.getPrimaryService(serviceUUID);
    setStatus(true);

    const hrChar = await bleService.getCharacteristic(hrUUID);
    hrChar.addEventListener("characteristicvaluechanged", e => {
      hrValueEl.textContent = new TextDecoder().decode(e.target.value).trim();
      hrTimeEl.textContent  = now();
    });
    await hrChar.startNotifications();

    const spo2Char = await bleService.getCharacteristic(spo2UUID);
    spo2Char.addEventListener("characteristicvaluechanged", e => {
      spo2ValueEl.textContent = new TextDecoder().decode(e.target.value).trim();
      spo2TimeEl.textContent  = now();
    });
    await spo2Char.startNotifications();

    const tempChar = await bleService.getCharacteristic(tempUUID);
    tempChar.addEventListener("characteristicvaluechanged", e => {
      const raw = new TextDecoder().decode(e.target.value).trim();
      const val = parseFloat(raw);
      tempTimeEl.textContent = now();
      if (!isNaN(val)) updateThermometer(val);
    });
    await tempChar.startNotifications();

  } catch (err) {
    console.error(err);
    setStatus(false);
  }
}

/* ===== WRITE LED ===== */
async function writeLED(val) {
  if (!bleService) { alert("Not connected"); return; }
  try {
    const char = await bleService.getCharacteristic(ledUUID);
    await char.writeValue(new Uint8Array([val]));
    valueSentEl.textContent = val ? "ON" : "OFF";
    const ind = document.getElementById("ledIndicator");
    val ? ind.classList.add("on") : ind.classList.remove("on");
  } catch (err) { console.error(err); }
}

// ✅ แก้ไขแล้ว
function disconnectBLE() {
  if (bleDevice) {
    try {
      if (bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();  // สั่ง disconnect
      }
    } catch (err) {
      console.error("Disconnect error:", err);
    }
  }
  // ✅ บังคับ reset UI และ state ทันที ไม่รอ event
  bleDevice  = null;
  bleServer  = null;
  bleService = null;
  setStatus(false);
}

function onDisconnected() {
  // ✅ เช็คก่อนว่ายังไม่ได้ reset ไปแล้ว (จากการกดปุ่ม)
  if (bleDevice) {
    bleDevice  = null;
    bleServer  = null;
    bleService = null;
  }
  setStatus(false);
}/* ===== SAVE RECORD ===== */
function saveRecord() {
  const hr   = hrValueEl.textContent;
  const spo2 = spo2ValueEl.textContent;
  const temp = document.getElementById("thermoNum").textContent;
  if (hr === "--" && spo2 === "--" && temp === "--") { alert("ยังไม่มีข้อมูลจาก ESP32"); return; }
  const timestamp = new Date().toLocaleString("th-TH");
  records.push({ timestamp, hr, spo2, temp });
  recordCount.textContent = records.length;
  updateTable();
}

function updateTable() {
  if (records.length === 1) tableBody.innerHTML = "";
  const r  = records[records.length - 1];
  const tr = document.createElement("tr");
  tr.className = "flash-row";
  tr.innerHTML = `
    <td style="color:var(--text-muted)">${records.length}</td>
    <td style="color:var(--text-dim)">${r.timestamp}</td>
    <td style="color:var(--red)">${r.hr}</td>
    <td style="color:var(--blue)">${r.spo2}</td>
    <td style="color:var(--amber)">${r.temp}</td>
  `;
  tableBody.appendChild(tr);
  tr.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

/* ===== DOWNLOAD CSV ===== */
function downloadCSV() {
  if (!records.length) { alert("ยังไม่มีข้อมูลที่บันทึก"); return; }
  const header = "No,Timestamp,HR (bpm),SpO2 (%),Temp (C)\n";
  const rows   = records.map((r,i) =>
    `${i+1},"${r.timestamp}",${r.hr},${r.spo2},${r.temp}`
  ).join("\n");
  const blob = new Blob(["\uFEFF" + header + rows], { type:"text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `health_data_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}

/* ===== CLEAR ===== */
function clearRecords() {
  if (!records.length) return;
  if (!confirm(`ลบข้อมูล ${records.length} รายการ?`)) return;
  records = []; recordCount.textContent = 0;
  tableBody.innerHTML = `<tr><td colspan="5" class="no-data">ยังไม่มีข้อมูล</td></tr>`;
}
</script>
</body>
</html>
