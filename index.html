<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>ESP32 Health Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0a1628;
    --surface:    #0f2040;
    --surface2:   #132650;
    --border:     #1e3a6a;
    --cyan:       #00d4ff;
    --green:      #00e5a0;
    --red:        #ff4f6d;
    --blue:       #4f8dff;
    --amber:      #ffb830;
    --text:       #e8f4ff;
    --text-muted: #5a7fa8;
    --text-dim:   #2e5070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,100,200,0.15) 0%, transparent 60%);
  }
  header {
    background: linear-gradient(90deg,#071526,#0f2040,#071526);
    border-bottom: 1px solid var(--border);
    height: 64px; display: flex; align-items: center; justify-content: center;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { display: flex; align-items: center; gap: 12px; }
  header h1 {
    font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700;
    letter-spacing: .06em; color: var(--cyan); text-shadow: 0 0 20px rgba(0,212,255,.4);
  }
  .ecg-svg { width: 80px; height: 28px; margin-left: 12px; }
  .ecg-path {
    stroke: var(--cyan); stroke-width: 1.5; fill: none;
    filter: drop-shadow(0 0 4px var(--cyan));
    stroke-dasharray: 200; stroke-dashoffset: 200;
    animation: ecgDraw 2s linear infinite;
  }
  @keyframes ecgDraw { 0%{stroke-dashoffset:200;opacity:1} 80%{opacity:1} 100%{stroke-dashoffset:0;opacity:0} }
  .content { max-width: 960px; margin: 0 auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 20px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; position: relative; overflow: hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:.4;
  }
  .cc { position:absolute; width:12px; height:12px; opacity:.35; }
  .cc.tl{top:8px;left:8px;border-top:1.5px solid var(--cyan);border-left:1.5px solid var(--cyan);}
  .cc.tr{top:8px;right:8px;border-top:1.5px solid var(--cyan);border-right:1.5px solid var(--cyan);}
  .cc.bl{bottom:8px;left:8px;border-bottom:1.5px solid var(--cyan);border-left:1.5px solid var(--cyan);}
  .cc.br{bottom:8px;right:8px;border-bottom:1.5px solid var(--cyan);border-right:1.5px solid var(--cyan);}
  .ble-card { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .btn-row  { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  button {
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 22px; border:none; border-radius:8px;
    font-family:'IBM Plex Sans Thai',sans-serif; font-size:.88rem; font-weight:600;
    cursor:pointer; transition:all .2s;
  }
  button:hover        { transform:translateY(-1px); filter:brightness(1.1); }
  button:disabled     { opacity:.4; cursor:not-allowed; transform:none; }
  .connectButton    { background:linear-gradient(135deg,#00c471,#00e5a0); color:#001a0d; box-shadow:0 4px 16px rgba(0,229,160,.25); }
  .disconnectButton { background:linear-gradient(135deg,#c9243c,#ff4f6d); color:#fff;    box-shadow:0 4px 16px rgba(255,79,109,.25); }
  .onButton         { background:linear-gradient(135deg,#c97000,#ffb830); color:#1a0a00; min-width:80px; box-shadow:0 4px 16px rgba(255,184,48,.3); }
  .offButton        { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); min-width:80px; }
  .saveButton       { background:linear-gradient(135deg,#1a4fcc,#4f8dff); color:#fff; }
  .downloadButton   { background:linear-gradient(135deg,#5a0099,#a04fff); color:#fff; }
  .clearButton      { background:linear-gradient(135deg,#990020,#cc2244); color:#fff; }
  .saveButton:hover,.downloadButton:hover,.clearButton:hover { transform:translateY(-1px); filter:brightness(1.1); }
  .ble-status { display:flex; align-items:center; gap:8px; font-size:.85rem; color:var(--text-muted); }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--red); box-shadow:0 0 8px var(--red); }
  .status-dot.connected { background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  #bleState { font-weight:600; color:var(--red); }
  #bleState.connected { color:var(--green); }
  .vitals-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .vital-card {
    background:var(--surface2); border:1px solid var(--border); border-radius:14px;
    padding:20px 16px; display:flex; flex-direction:column; align-items:center;
    gap:8px; position:relative; overflow:hidden;
  }
  .vital-card.hr   { border-top:3px solid var(--red); }
  .vital-card.spo2 { border-top:3px solid var(--blue); }
  .vital-card.temp { border-top:3px solid var(--amber); }
  .vital-label { font-size:.78rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); }
  .vital-value { font-family:'Space Mono',monospace; font-size:2.4rem; font-weight:700; line-height:1; }
  .vital-card.hr   .vital-value { color:var(--red);  text-shadow:0 0 20px rgba(255,79,109,.4); }
  .vital-card.spo2 .vital-value { color:var(--blue); text-shadow:0 0 20px rgba(79,141,255,.4); }
  .vital-unit { font-size:.75rem; color:var(--text-muted); font-family:'Space Mono',monospace; }
  .vital-time { font-size:.68rem; color:var(--text-dim); font-family:'Space Mono',monospace; }
  .beat-ring {
    position:absolute; top:12px; right:12px; width:10px; height:10px; border-radius:50%;
    background:var(--red); box-shadow:0 0 6px var(--red); animation:heartbeat .85s ease-in-out infinite;
  }
  @keyframes heartbeat { 0%,100%{transform:scale(1)} 30%{transform:scale(1.7)} 60%{transform:scale(1.2)} }
  .thermo-section { display:flex; flex-direction:column; align-items:center; width:100%; gap:8px; }
  .thermo-body    { display:flex; align-items:flex-end; gap:10px; }
  .thermo-tube-wrap { display:flex; flex-direction:column; align-items:center; }
  .thermo-tube {
    width:16px; height:80px; background:rgba(255,184,48,.05);
    border:2px solid rgba(255,184,48,.35); border-bottom:none;
    border-radius:8px 8px 0 0; position:relative; overflow:hidden;
  }
  .thermo-tube::after {
    content:''; position:absolute; top:4px; left:3px; width:4px; bottom:0;
    background:linear-gradient(180deg,rgba(255,255,255,.25),transparent); border-radius:2px;
  }
  .thermo-fill {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(180deg,#ffe060 0%,#ff8c00 100%);
    transition:height 1.2s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 -4px 12px rgba(255,184,48,.7);
  }
  .thermo-bulb {
    width:26px; height:26px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ffe060,#ff6a00);
    border:2px solid rgba(255,184,48,.4);
    box-shadow:0 0 16px rgba(255,140,0,.8),0 0 30px rgba(255,140,0,.3);
    margin-top:-2px; transition:background .8s,box-shadow .8s;
  }
  .thermo-scale { height:80px; display:flex; flex-direction:column; justify-content:space-between; padding:2px 0; }
  .thermo-tick  { display:flex; align-items:center; gap:4px; }
  .tick-line    { width:8px; height:1px; background:var(--text-dim); }
  .tick-label   { font-family:'Space Mono',monospace; font-size:.58rem; color:var(--text-dim); }
  .thermo-readout { display:flex; flex-direction:column; align-items:center; gap:4px; padding-bottom:28px; }
  .thermo-num {
    font-family:'Space Mono',monospace; font-size:2rem; font-weight:700;
    color:var(--amber); text-shadow:0 0 20px rgba(255,184,48,.5); line-height:1; transition:color .8s;
  }
  .thermo-badge { font-size:.68rem; padding:2px 10px; border-radius:10px; font-weight:600; letter-spacing:.05em; transition:all .5s; }
  .badge-na    { background:rgba(90,127,168,.1);  color:var(--text-muted); border:1px solid var(--border); }
  .badge-low   { background:rgba(79,141,255,.15); color:var(--blue);       border:1px solid rgba(79,141,255,.3); }
  .badge-norm  { background:rgba(0,229,160,.15);  color:var(--green);      border:1px solid rgba(0,229,160,.3); }
  .badge-high  { background:rgba(255,79,109,.15); color:var(--red);        border:1px solid rgba(255,79,109,.3); }
  .led-card { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .section-title {
    display:flex; align-items:center; gap:8px; font-size:.85rem; font-weight:600;
    color:var(--text-muted); letter-spacing:.05em; text-transform:uppercase;
  }
  .led-indicator { width:14px; height:14px; border-radius:50%; background:#222; border:2px solid #333; transition:all .3s; }
  .led-indicator.on { background:#ffdd00; box-shadow:0 0 12px #ffdd00,0 0 24px rgba(255,221,0,.5); border-color:#ffa000; }
  .led-last { font-size:.72rem; color:var(--text-dim); font-family:'Space Mono',monospace; }
  .logger-title {
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:16px; font-size:.85rem; font-weight:600;
    color:var(--text-muted); letter-spacing:.05em; text-transform:uppercase;
  }
  .logger-buttons { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .record-count { text-align:center; font-size:.72rem; color:var(--text-dim); margin-bottom:12px; font-family:'Space Mono',monospace; }
  .table-wrap { border-radius:10px; overflow:hidden; border:1px solid var(--border); overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:.78rem; }
  thead tr { background:linear-gradient(90deg,#0d1f40,#0f2a50); }
  thead th { padding:10px 14px; text-align:center; font-weight:600; letter-spacing:.04em; color:var(--text-muted); font-size:.72rem; border-bottom:1px solid var(--border); }
  tbody tr { border-bottom:1px solid rgba(30,58,106,.4); transition:background .15s; }
  tbody tr:hover { background:rgba(0,212,255,.04); }
  tbody tr:last-child { border-bottom:none; }
  tbody td { padding:9px 14px; text-align:center; font-family:'Space Mono',monospace; font-size:.72rem; color:var(--text); }
  .no-data { text-align:center; padding:28px; color:var(--text-dim); font-size:.78rem; font-family:'Space Mono',monospace; }
  @keyframes flashRow { 0%{background:rgba(0,229,160,.25)} 100%{background:transparent} }
  .flash-row { animation:flashRow .6s ease; }
  @media(max-width:620px){
    .vitals-grid{grid-template-columns:1fr 1fr;}
    .vital-card.temp{grid-column:1/-1;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="17" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 2" opacity=".4"/>
      <circle cx="18" cy="18" r="12" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1" opacity=".5"/>
      <path d="M6 18 H10 L12 14 L15 22 L18 10 L21 26 L24 18 H30"
            stroke="#00d4ff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>ESP32 HEALTH MONITOR</h1>
    <svg class="ecg-svg" viewBox="0 0 80 28">
      <path class="ecg-path" d="M0,14 H18 L20,10 L22,18 L24,6 L26,22 L28,14 H46 L48,10 L50,18 L52,6 L54,22 L56,14 H80"/>
    </svg>
  </div>
</header>

<div class="content">

  <!-- BLE -->
  <div class="card ble-card">
    <div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>
    <div class="btn-row">
      <button id="connectBleButton"    class="connectButton">🔗 Connect BLE</button>
      <button id="disconnectBleButton" class="disconnectButton">✖ Disconnect</button>
    </div>
    <div class="ble-status">
      <div class="status-dot" id="statusDot"></div>
      <span>BLE Status: <span id="bleState">Disconnected</span></span>
    </div>
  </div>

  <!-- VITALS -->
  <div class="vitals-grid">
    <div class="vital-card hr">
      <div class="beat-ring"></div>
      <div class="vital-label">❤️ Heart Rate</div>
      <div class="vital-value" id="hrValue">--</div>
      <div class="vital-unit">bpm</div>
      <div class="vital-time">Last: <span id="hrTime">--</span></div>
    </div>

    <div class="vital-card spo2">
      <div class="vital-label">🩸 SpO₂</div>
      <div class="vital-value" id="spo2Value">--</div>
      <div class="vital-unit">%</div>
      <div class="vital-time">Last: <span id="spo2Time">--</span></div>
    </div>

    <div class="vital-card temp">
      <div class="vital-label">🌡️ Body Temp</div>
      <div class="thermo-section">
        <div class="thermo-body">

          <!-- หลอดเทอร์โมมิเตอร์ -->
          <div class="thermo-tube-wrap">
            <div class="thermo-tube">
              <div class="thermo-fill" id="thermoFill" style="height:0%"></div>
            </div>
            <div class="thermo-bulb" id="thermoBulb"></div>
          </div>

          <!-- สเกล 20–35°C แบ่ง 4 ขีด -->
          <div class="thermo-scale">
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">35°</span></div>
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">30°</span></div>
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">25°</span></div>
            <div class="thermo-tick"><div class="tick-line"></div><span class="tick-label">20°</span></div>
          </div>

          <!-- ตัวเลข + badge -->
          <div class="thermo-readout">
            <div class="thermo-num" id="thermoNum">--</div>
            <div class="vital-unit">°C</div>
            <div class="thermo-badge badge-na" id="thermoStatus">-- N/A</div>
          </div>

        </div>
      </div>
      <div class="vital-time">Last: <span id="tempTime">--</span></div>
    </div>
  </div>

  <!-- LED -->
  <div class="card led-card">
    <div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>
    <div class="section-title">
      <span class="led-indicator" id="ledIndicator"></span>
      💡 Control LED (GPIO 2)
    </div>
    <div class="btn-row">
      <button id="onButton"  class="onButton">ON</button>
      <button id="offButton" class="offButton">OFF</button>
    </div>
    <div class="led-last">Last sent: <span id="valueSent">--</span></div>
  </div>

  <!-- DATA LOGGER -->
  <div class="card">
    <div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>
    <div class="logger-title">📋 Data Logger</div>
    <div class="logger-buttons">
      <button id="saveButton"     class="saveButton">💾 บันทึกค่าปัจจุบัน</button>
      <button id="downloadButton" class="downloadButton">⬇️ ดาวน์โหลด CSV</button>
      <button id="clearButton"    class="clearButton">🗑️ ล้างข้อมูล</button>
    </div>
    <div class="record-count">บันทึกแล้ว: <strong><span id="recordCount">0</span></strong> รายการ</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>เวลา</th>
            <th>❤️ HR (bpm)</th><th>🩸 SpO₂ (%)</th><th>🌡️ Temp (°C)</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" class="no-data">ยังไม่มีข้อมูล</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
/* ===== ELEMENTS ===== */
const connectBtn    = document.getElementById("connectBleButton");
const disconnectBtn = document.getElementById("disconnectBleButton");
const onBtn         = document.getElementById("onButton");
const offBtn        = document.getElementById("offButton");
const saveBtn       = document.getElementById("saveButton");
const downloadBtn   = document.getElementById("downloadButton");
const clearBtn      = document.getElementById("clearButton");
const bleStateEl    = document.getElementById("bleState");
const statusDot     = document.getElementById("statusDot");
const hrValueEl     = document.getElementById("hrValue");
const hrTimeEl      = document.getElementById("hrTime");
const spo2ValueEl   = document.getElementById("spo2Value");
const spo2TimeEl    = document.getElementById("spo2Time");
const tempTimeEl    = document.getElementById("tempTime");
const valueSentEl   = document.getElementById("valueSent");
const tableBody     = document.getElementById("tableBody");
const recordCount   = document.getElementById("recordCount");

/* ===== UUID ===== */
const deviceName  = "ESP32TONG";
const serviceUUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
const tempUUID    = "19b10001-e8f2-537e-4f6c-d104768a1214";
const ledUUID     = "19b10002-e8f2-537e-4f6c-d104768a1214";
const hrUUID      = "19b10003-e8f2-537e-4f6c-d104768a1214";
const spo2UUID    = "19b10004-e8f2-537e-4f6c-d104768a1214";

/* ===== STATE ===== */
let bleDevice  = null;
let bleServer  = null;
let bleService = null;
let records    = [];

/* ===== EVENTS ===== */
connectBtn.onclick    = connectBLE;
disconnectBtn.onclick = disconnectBLE;
onBtn.onclick         = () => writeLED(1);
offBtn.onclick        = () => writeLED(0);
saveBtn.onclick       = saveRecord;
downloadBtn.onclick   = downloadCSV;
clearBtn.onclick      = clearRecords;

const now = () => new Date().toLocaleTimeString();

/* ===== BLE STATUS ===== */
function setStatus(connected) {
  bleStateEl.textContent = connected ? "Connected" : "Disconnected";
  bleStateEl.className   = connected ? "connected" : "";
  statusDot.className    = "status-dot" + (connected ? " connected" : "");
}

/* ===== THERMOMETER =====
   ช่วง: 20–35°C
   < 25°C  → อุณหภูมิต่ำ  (น้ำเงิน)
   25–30°C → อุณหภูมิปกติ (เขียว)
   > 30°C  → อุณหภูมิสูง  (แดง)
*/
const T_MIN = 20;
const T_MAX = 35;

function updateThermometer(temp) {
  const pct = Math.max(2, Math.min(98, ((temp - T_MIN) / (T_MAX - T_MIN)) * 100));
  document.getElementById("thermoFill").style.height = pct + "%";
  document.getElementById("thermoNum").textContent   = temp.toFixed(1);

  const status = document.getElementById("thermoStatus");
  const bulb   = document.getElementById("thermoBulb");

  if (temp < 25) {
    /* ---- อุณหภูมิต่ำ ---- */
    status.className  = "thermo-badge badge-low";
    status.textContent = "❄️ อุณหภูมิต่ำ";
    bulb.style.background = "radial-gradient(circle at 35% 30%,#a0d0ff,#4080ff)";
    bulb.style.boxShadow  = "0 0 16px rgba(79,141,255,.8)";
  } else if (temp <= 30) {
    /* ---- อุณหภูมิปกติ ---- */
    status.className  = "thermo-badge badge-norm";
    status.textContent = "✅ อุณหภูมิปกติ";
    bulb.style.background = "radial-gradient(circle at 35% 30%,#ffe060,#ff6a00)";
    bulb.style.boxShadow  = "0 0 16px rgba(255,140,0,.8)";
  } else {
    /* ---- อุณหภูมิสูง ---- */
    status.className  = "thermo-badge badge-high";
    status.textContent = "🔴 อุณหภูมิสูง";
    bulb.style.background = "radial-gradient(circle at 35% 30%,#ff8080,#cc0000)";
    bulb.style.boxShadow  = "0 0 20px rgba(255,60,60,1),0 0 36px rgba(200,0,0,.5)";
  }
}

/* ===== CONNECT BLE ===== */
async function connectBLE() {
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: deviceName }],
      optionalServices: [serviceUUID],
    });
    bleDevice.addEventListener("gattservicedisconnected", onDisconnected);
    bleServer  = await bleDevice.gatt.connect();
    bleService = await bleServer.getPrimaryService(serviceUUID);
    setStatus(true);

    /* Heart Rate */
    const hrChar = await bleService.getCharacteristic(hrUUID);
    hrChar.addEventListener("characteristicvaluechanged", e => {
      hrValueEl.textContent = new TextDecoder().decode(e.target.value).trim();
      hrTimeEl.textContent  = now();
    });
    await hrChar.startNotifications();

    /* SpO2 */
    const spo2Char = await bleService.getCharacteristic(spo2UUID);
    spo2Char.addEventListener("characteristicvaluechanged", e => {
      spo2ValueEl.textContent = new TextDecoder().decode(e.target.value).trim();
      spo2TimeEl.textContent  = now();
    });
    await spo2Char.startNotifications();

    /* Body Temp → thermometer */
    const tempChar = await bleService.getCharacteristic(tempUUID);
    tempChar.addEventListener("characteristicvaluechanged", e => {
      const raw = new TextDecoder().decode(e.target.value).trim();
      const val = parseFloat(raw);
      tempTimeEl.textContent = now();
      if (!isNaN(val)) updateThermometer(val);
    });
    await tempChar.startNotifications();

  } catch (err) {
    console.error(err);
    setStatus(false);
  }
}

/* ===== WRITE LED ===== */
async function writeLED(val) {
  if (!bleService) { alert("Not connected"); return; }
  try {
    const char = await bleService.getCharacteristic(ledUUID);
    await char.writeValue(new Uint8Array([val]));
    const state = val ? "ON" : "OFF";
    valueSentEl.textContent = state;
    const ind = document.getElementById("ledIndicator");
    val ? ind.classList.add("on") : ind.classList.remove("on");
  } catch (err) { console.error(err); }
}

/* ===== DISCONNECT ===== */
function disconnectBLE() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
}
function onDisconnected() { setStatus(false); bleService = null; }

/* ===== SAVE RECORD ===== */
function saveRecord() {
  const hr   = hrValueEl.textContent;
  const spo2 = spo2ValueEl.textContent;
  const temp = document.getElementById("thermoNum").textContent;
  if (hr === "--" && spo2 === "--" && temp === "--") { alert("ยังไม่มีข้อมูลจาก ESP32"); return; }
  const timestamp = new Date().toLocaleString("th-TH");
  records.push({ timestamp, hr, spo2, temp });
  recordCount.textContent = records.length;
  updateTable();
}

function updateTable() {
  if (records.length === 1) tableBody.innerHTML = "";
  const r  = records[records.length - 1];
  const tr = document.createElement("tr");
  tr.className = "flash-row";
  tr.innerHTML = `
    <td style="color:var(--text-muted)">${records.length}</td>
    <td style="color:var(--text-dim)">${r.timestamp}</td>
    <td style="color:var(--red)">${r.hr}</td>
    <td style="color:var(--blue)">${r.spo2}</td>
    <td style="color:var(--amber)">${r.temp}</td>
  `;
  tableBody.appendChild(tr);
  tr.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

/* ===== DOWNLOAD CSV ===== */
function downloadCSV() {
  if (!records.length) { alert("ยังไม่มีข้อมูลที่บันทึก"); return; }
  const header = "No,Timestamp,HR (bpm),SpO2 (%),Temp (C)\n";
  const rows   = records.map((r,i) =>
    `${i+1},"${r.timestamp}",${r.hr},${r.spo2},${r.temp}`
  ).join("\n");
  const blob = new Blob(["\uFEFF" + header + rows], { type:"text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `health_data_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}

/* ===== CLEAR ===== */
function clearRecords() {
  if (!records.length) return;
  if (!confirm(`ลบข้อมูล ${records.length} รายการ?`)) return;
  records = []; recordCount.textContent = 0;
  tableBody.innerHTML = `<tr><td colspan="5" class="no-data">ยังไม่มีข้อมูล</td></tr>`;
}
</script>
